name: Test features

on:
  pull_request:
    paths:
      - "features/**"
      - ".github/workflows/test-features.yaml"
  workflow_dispatch:

jobs:
  detect:
    name: Detect features
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.set.outputs.features }}
    steps:
      - uses: actions/checkout@v4

      - id: set
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d features/src ]]; then
            echo "features=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FEATURES=$(ls -1 features/src | jq -R . | jq -sc .)
          echo "features=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "Detected: $FEATURES"

  test-autogenerated:
    needs: detect
    if: needs.detect.outputs.features != '[]' && needs.detect.outputs.features != ''
    name: Auto • ${{ matrix.feature }} on ${{ matrix.base-image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.detect.outputs.features) }}
        base-image:
          - debian:latest
          - ubuntu:latest
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test
        run: |
          devcontainer features test \
            --skip-scenarios \
            --features ${{ matrix.feature }} \
            --base-image ${{ matrix.base-image }} \
            --collection-folder ./features \
            .

  test-scenarios:
    needs: detect
    if: needs.detect.outputs.features != '[]' && needs.detect.outputs.features != ''
    name: Scenarios • ${{ matrix.feature }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.detect.outputs.features) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test
        run: |
          devcontainer features test \
            --features ${{ matrix.feature }} \
            --skip-autogenerated \
            --log-level trace \
            --collection-folder ./features \
            .

  test-global:
    name: Global scenarios
    runs-on: ubuntu-latest
    if: hashFiles('features/test/_global/**') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test
        run: |
          devcontainer features test \
            --global-scenarios-only \
            --collection-folder ./features \
            .
